<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neubo — ROP Screening for macOS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            background: #0a0a0a;
            color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 640px;
            padding: 60px 32px;
            text-align: center;
        }

        .app-icon {
            width: 128px;
            height: 128px;
            margin: 0 auto 32px;
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 18px;
            color: #888;
            margin-bottom: 48px;
            line-height: 1.5;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 40px;
            background: #3fbe77;
            color: #000;
            font-size: 17px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px rgba(63, 190, 119, 0.3);
        }

        .download-btn:hover {
            background: #4dd88a;
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(63, 190, 119, 0.4);
        }

        .download-btn:active {
            transform: translateY(0);
        }

        .download-btn svg {
            width: 20px;
            height: 20px;
        }

        .version-info {
            margin-top: 16px;
            font-size: 14px;
            color: #555;
        }

        .version-info a {
            color: #3fbe77;
            text-decoration: none;
        }

        .version-info a:hover {
            text-decoration: underline;
        }

        .requirements {
            margin-top: 48px;
            padding-top: 32px;
            border-top: 1px solid #1a1a1a;
            font-size: 13px;
            color: #555;
            line-height: 1.8;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: #1a1a1a;
            border-radius: 6px;
            font-size: 12px;
            color: #888;
            margin: 4px;
        }

        .footer {
            margin-top: 48px;
            font-size: 13px;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .footer a {
            color: #555;
            text-decoration: none;
        }

        .footer a:hover {
            color: #3fbe77;
        }

        .remidio-logo {
            height: 28px;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .remidio-logo:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="app-icon.png" alt="Neubo App Icon" class="app-icon">

        <h1>Neubo</h1>
        <p class="subtitle">
            ROP screening powered by AI.<br>
            Built for Remidio devices on macOS.
        </p>

        <a id="download-btn" class="download-btn" href="#">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5 5-5M12 15V3"/>
            </svg>
            Download for macOS
        </a>

        <p class="version-info">
            <span id="version-label"></span><br>
            <a href="https://github.com/Remidio-Innovative-Solutions-Pvt-Ltd/neubo-releases/releases">View all releases</a>
        </p>

        <div class="requirements">
            <span class="badge">macOS 14.4+</span>
            <span class="badge">Apple Silicon</span>
            <span class="badge">Auto-updates via Sparkle</span>
            <br><br>
            Neubo automatically checks for updates and installs them in the background.
        </div>

        <div class="footer">
            <a href="https://remidio.com">
                <img src="remidio-logo.png" alt="Remidio" class="remidio-logo">
            </a>
            <p>&copy; Remidio Innovative Solutions Pvt. Ltd.</p>
        </div>
    </div>

    <script>
        // Fetch latest release and set direct DMG download link
        fetch('https://api.github.com/repos/Remidio-Innovative-Solutions-Pvt-Ltd/neubo-releases/releases/latest')
            .then(r => r.json())
            .then(release => {
                const dmg = release.assets.find(a => a.name.endsWith('.dmg'));
                if (dmg) {
                    document.getElementById('download-btn').href = dmg.browser_download_url;
                }
                const version = release.tag_name.replace('v', '');
                document.getElementById('version-label').textContent = 'Latest: ' + release.name;
            })
            .catch(() => {
                // Fallback to releases page
                document.getElementById('download-btn').href =
                    'https://github.com/Remidio-Innovative-Solutions-Pvt-Ltd/neubo-releases/releases/latest';
            });
    </script>
</body>
</html>
